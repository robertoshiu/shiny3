<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="顯藝科技 ShinyLogic">
  <rect width="64" height="64" rx="10" fill="#07090C"/>
  <!-- wafer: concentric rings + notch -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#67E8F9" stroke-width="1.4" opacity=".55"/>
  <circle cx="32" cy="32" r="15" fill="none" stroke="#67E8F9" stroke-width="1.2" opacity=".30"/>
  <!-- notch (flat) -->
  <path d="M32 54 m-5 0 a5 5 0 0 1 10 0" fill="#07090C" stroke="#67E8F9" stroke-width="1.2" opacity=".6"/>
  <!-- SL monogram -->
  <text x="32" y="40" text-anchor="middle"
        font-family="'Saira','Segoe UI',sans-serif" font-weight="700" font-size="22"
        letter-spacing="-1" fill="#67E8F9">SL</text>
  <!-- one reticle tick (top-left L mark) -->
  <path d="M12 18 L12 12 L18 12" fill="none" stroke="#67E8F9" stroke-width="1.6"/>
</svg>
